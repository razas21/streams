<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FIFA World Cup 2026</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;600&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #08090c;
    color: #e2e8f0;
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 2rem 1rem;
  }

  .live {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    font-size: 0.65rem;
    font-weight: 600;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: #94a3b8;
    margin-bottom: 1.5rem;
  }

  .live-dot {
    width: 6px; height: 6px;
    background: #e63946;
    border-radius: 50%;
    animation: blink 1.4s ease-in-out infinite;
  }

  @keyframes blink {
    0%, 100% { opacity: 1; }
    50%       { opacity: 0.2; }
  }

  #matchTitle {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.6rem;
    letter-spacing: 0.12em;
    color: #cbd5e1;
    margin-bottom: 1.25rem;
    text-align: center;
    min-height: 2rem;
    transition: opacity 0.2s;
  }

  /* ── Match picker ── */
  .picker-wrap {
    width: min(920px, 100%);
    margin-bottom: 0.75rem;
    position: relative;
  }

  .picker-row {
    display: flex;
    gap: 0.5rem;
  }

  .picker-btn {
    flex: 1;
    background: #0f1217;
    border: 1px solid #1e2330;
    border-radius: 6px;
    color: #64748b;
    font-family: 'Inter', sans-serif;
    font-size: 0.78rem;
    padding: 0 0.85rem;
    height: 38px;
    cursor: pointer;
    text-align: left;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 0.5rem;
    transition: border-color 0.15s;
    white-space: nowrap;
    overflow: hidden;
  }

  .picker-btn:hover { border-color: #3b4a63; color: #94a3b8; }
  .picker-btn.open { border-color: #3b4a63; color: #94a3b8; }

  .picker-btn-text {
    overflow: hidden;
    text-overflow: ellipsis;
    flex: 1;
  }

  .picker-btn svg { flex-shrink: 0; width: 12px; height: 12px; }

  .refresh-btn {
    background: transparent;
    border: 1px solid #1e2330;
    border-radius: 6px;
    color: #475569;
    width: 38px;
    height: 38px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: border-color 0.15s, color 0.15s;
  }

  .refresh-btn:hover { border-color: #3b4a63; color: #94a3b8; }
  .refresh-btn svg { width: 14px; height: 14px; }
  .refresh-btn.spinning svg { animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Match dropdown */
  .match-dropdown {
    position: absolute;
    top: calc(100% + 6px);
    left: 0; right: 0;
    background: #0f1217;
    border: 1px solid #1e2330;
    border-radius: 8px;
    max-height: 320px;
    overflow-y: auto;
    z-index: 100;
    display: none;
    box-shadow: 0 8px 32px rgba(0,0,0,0.8);
    scrollbar-width: thin;
    scrollbar-color: #1e2330 transparent;
  }

  .match-dropdown.open { display: block; }

  .match-dropdown-header {
    padding: 0.5rem 0.85rem;
    font-size: 0.6rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: #334155;
    border-bottom: 1px solid #0d1015;
    display: flex;
    justify-content: space-between;
  }

  .match-group-label {
    padding: 0.4rem 0.85rem 0.2rem;
    font-size: 0.6rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: #334155;
    background: #080a0d;
  }

  .match-item {
    display: flex;
    align-items: center;
    gap: 0.6rem;
    padding: 0.6rem 0.85rem;
    font-size: 0.75rem;
    color: #64748b;
    cursor: pointer;
    transition: background 0.1s, color 0.1s;
    border-bottom: 1px solid #0d1015;
  }

  .match-item:last-child { border-bottom: none; }
  .match-item:hover { background: #131820; color: #94a3b8; }
  .match-item.active { color: #e2e8f0; background: #131820; }

  .match-live-dot {
    width: 5px; height: 5px;
    background: #e63946;
    border-radius: 50%;
    flex-shrink: 0;
    animation: blink 1.4s ease-in-out infinite;
  }

  .match-item-title { flex: 1; }

  .match-sources {
    font-size: 0.62rem;
    color: #334155;
    flex-shrink: 0;
  }

  .match-cat-badge {
    font-size: 0.58rem;
    color: #334155;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    flex-shrink: 0;
  }

  .match-empty {
    padding: 1.5rem;
    text-align: center;
    font-size: 0.72rem;
    color: #334155;
  }

  /* ── Stream controls ── */
  .stream-row {
    width: min(920px, 100%);
    display: none;
    gap: 0.5rem;
    margin-bottom: 0.75rem;
    align-items: center;
    justify-content: flex-end;
  }

  .stream-row.visible { display: flex; }

  .next-btn {
    background: transparent;
    border: 1px solid #1e2330;
    border-radius: 6px;
    color: #475569;
    font-family: 'Inter', sans-serif;
    font-size: 0.72rem;
    font-weight: 500;
    padding: 0 0.9rem;
    height: 34px;
    cursor: pointer;
    white-space: nowrap;
    transition: border-color 0.15s, color 0.15s;
    display: flex;
    align-items: center;
    gap: 0.4rem;
    flex-shrink: 0;
  }

  .next-btn:hover { border-color: #e63946; color: #e63946; }
  .next-btn svg { width: 12px; height: 12px; }

  .dots-wrap { position: relative; }

  .dots-btn {
    background: transparent;
    border: 1px solid #1e2330;
    border-radius: 6px;
    color: #475569;
    width: 34px; height: 34px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: border-color 0.15s, color 0.15s;
    letter-spacing: 0.05em;
    font-size: 0.9rem;
    line-height: 1;
  }

  .dots-btn:hover,
  .dots-btn.open { border-color: #3b4a63; color: #94a3b8; }

  .fs-btn {
    background: transparent;
    border: 1px solid #1e2330;
    border-radius: 6px;
    color: #475569;
    width: 34px; height: 34px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: border-color 0.15s, color 0.15s;
  }

  .fs-btn:hover { border-color: #3b4a63; color: #94a3b8; }
  .fs-btn svg { width: 14px; height: 14px; }

  /* Stream dropdown */
  .stream-dropdown {
    position: absolute;
    bottom: calc(100% + 6px);
    right: 0;
    background: #0f1217;
    border: 1px solid #1e2330;
    border-radius: 8px;
    min-width: 280px;
    max-height: 260px;
    overflow-y: auto;
    z-index: 100;
    display: none;
    box-shadow: 0 8px 32px rgba(0,0,0,0.7);
    scrollbar-width: thin;
    scrollbar-color: #1e2330 transparent;
  }

  .stream-dropdown.open { display: block; }

  .dropdown-header {
    padding: 0.5rem 0.85rem;
    font-size: 0.6rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: #334155;
    border-bottom: 1px solid #0d1015;
  }

  .dropdown-item {
    display: flex;
    align-items: center;
    gap: 0.6rem;
    padding: 0.55rem 0.85rem;
    font-size: 0.72rem;
    color: #64748b;
    cursor: pointer;
    transition: background 0.1s, color 0.1s;
    border-bottom: 1px solid #0d1015;
    font-family: 'Inter', sans-serif;
  }

  .dropdown-item:last-child { border-bottom: none; }
  .dropdown-item:hover { background: #131820; color: #94a3b8; }
  .dropdown-item.active { color: #e2e8f0; background: #131820; }

  .stream-num {
    font-size: 0.6rem;
    color: #334155;
    min-width: 1.4rem;
    font-variant-numeric: tabular-nums;
  }

  .dropdown-item.active .stream-num { color: #e63946; }

  /* ── Player ── */
  .stage {
    width: min(920px, 100vw);
    aspect-ratio: 16 / 9;
    border-radius: 8px;
    overflow: hidden;
    border: 1px solid #141820;
    box-shadow: 0 32px 80px rgba(0,0,0,0.8);
    position: relative;
    background: #0a0b0e;
  }

  .stage iframe {
    width: 100%; height: 100%;
    border: none; display: block;
  }

  .stage-empty {
    position: absolute; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 0.75rem;
  }

  .stage-empty p {
    font-size: 0.72rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: #1e2535;
  }

  /* Auto-switch overlay */
  .switch-overlay {
    position: absolute; inset: 0;
    background: rgba(8,9,12,0.85);
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 0.75rem;
    z-index: 10;
  }

  .switch-overlay.visible { display: flex; }
  .switch-overlay p { font-size: 0.78rem; color: #94a3b8; letter-spacing: 0.06em; }

  .switch-overlay .countdown {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 2.5rem;
    color: #e63946;
    line-height: 1;
  }

  .switch-overlay .cancel-btn {
    background: transparent;
    border: 1px solid #1e2330;
    border-radius: 5px;
    color: #475569;
    font-family: 'Inter', sans-serif;
    font-size: 0.7rem;
    padding: 0.35rem 0.85rem;
    cursor: pointer;
    transition: color 0.15s, border-color 0.15s;
    margin-top: 0.25rem;
  }

  .switch-overlay .cancel-btn:hover { color: #e2e8f0; border-color: #475569; }

  /* Fullscreen exit button */
  .fs-exit-btn { display: none; }

  .stage:fullscreen .fs-exit-btn,
  .stage:-webkit-full-screen .fs-exit-btn {
    display: flex;
    position: absolute;
    top: 1rem; right: 1rem;
    z-index: 20;
    align-items: center;
    gap: 0.4rem;
    background: rgba(8,9,12,0.75);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 6px;
    color: #94a3b8;
    font-family: 'Inter', sans-serif;
    font-size: 0.72rem;
    padding: 0.4rem 0.75rem;
    cursor: pointer;
    backdrop-filter: blur(4px);
    transition: background 0.15s, color 0.15s;
  }

  .stage:fullscreen .fs-exit-btn:hover,
  .stage:-webkit-full-screen .fs-exit-btn:hover {
    background: rgba(30,35,48,0.9);
    color: #e2e8f0;
  }

  .stage:fullscreen,
  .stage:-webkit-full-screen {
    width: 100vw; height: 100vh;
    aspect-ratio: unset; border-radius: 0; border: none; max-width: unset;
  }

  .stage:fullscreen iframe,
  .stage:-webkit-full-screen iframe { width: 100%; height: 100%; }

  .status {
    font-size: 0.68rem;
    color: #475569;
    letter-spacing: 0.06em;
    margin-top: 0.75rem;
    min-height: 1rem;
    text-align: center;
  }

  .status.error { color: #e63946; }

  @media (max-width: 500px) {
    .next-btn span { display: none; }
  }
</style>
</head>
<body>

  <div class="live">
    <span class="live-dot"></span>
    Live · FIFA World Cup 2026
  </div>

  <div id="matchTitle">Select a match to watch</div>

  <!-- Match picker -->
  <div class="picker-wrap" id="pickerWrap" style="display:none;">
    <div class="picker-row">
      <button class="picker-btn" id="pickerBtn" onclick="toggleMatchDropdown()">
        <span class="picker-btn-text" id="pickerBtnText">Loading matches…</span>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 9l6 6 6-6"/></svg>
      </button>
      <button class="refresh-btn" id="refreshBtn" onclick="fetchMatches()" title="Refresh matches">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M23 4v6h-6M1 20v-6h6"/>
          <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/>
        </svg>
      </button>
    </div>
    <div class="match-dropdown" id="matchDropdown">
      <div class="match-dropdown-header">
        <span>Live & Upcoming Matches</span>
        <span id="matchCount"></span>
      </div>
    </div>
  </div>

  <!-- Stream controls -->
  <div class="stream-row" id="streamRow">
    <button class="next-btn" onclick="nextStream()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M5 12h14M13 6l6 6-6 6"/>
      </svg>
      <span>Not working?</span>
    </button>
    <button class="fs-btn" onclick="toggleFullscreen()" title="Fullscreen">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"/>
      </svg>
    </button>
    <div class="dots-wrap">
      <button class="dots-btn" id="dotsBtn" onclick="toggleStreamDropdown()" title="Select stream">···</button>
      <div class="stream-dropdown" id="streamDropdown">
        <div class="dropdown-header">Select stream</div>
      </div>
    </div>
  </div>

  <!-- Player -->
  <div class="stage" id="stage">
    <div class="stage-empty" id="stageEmpty">
      <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#1e2535" stroke-width="1">
        <rect x="2" y="3" width="20" height="14" rx="2"/>
        <path d="M8 21h8M12 17v4"/>
      </svg>
      <p id="stageEmptyText">Loading…</p>
    </div>
    <iframe id="streamPlayer" style="display:none" allowfullscreen
      allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; fullscreen">
    </iframe>
    <button class="fs-exit-btn" onclick="toggleFullscreen()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14">
        <path d="M8 3v3a2 2 0 0 1-2 2H3m18 0h-3a2 2 0 0 1-2-2V3m0 18v-3a2 2 0 0 1 2-2h3M3 16h3a2 2 0 0 1 2 2v3"/>
      </svg>
      Exit
    </button>
    <div class="switch-overlay" id="switchOverlay">
      <p>Stream failed — switching in</p>
      <div class="countdown" id="countdown">3</div>
      <button class="cancel-btn" onclick="cancelAutoSwitch()">Cancel</button>
    </div>
  </div>

  <div class="status" id="status"></div>

<script>
  let matches = [];
  let streams = [];
  let currentIdx = 0;
  let countdownInterval = null;
  let selectedMatch = null;

  // ── Status ──
  function setStatus(msg, isError) {
    const el = document.getElementById('status');
    el.textContent = msg;
    el.className = 'status' + (isError ? ' error' : '');
  }

  // ── HARDCODED MATCH (temporary, until the matches list scraper is wired back up) ──
  // Just drop a match page URL here, e.g. 'http://ntvs.cx/watch/kobra/spain-vs-austria-2503636'
  // streams.js will still scrape this page for its available stream sources.
  const HARDCODED_MATCH_URL = 'http://ntvs.cx/watch/kobra/spain-vs-austria-2503636';

  // ── Fetch match list ──
  async function fetchMatches() {
    // Bypassed for now — loading the hardcoded stream directly instead.
    loadHardcodedStream();
    return;

    const btn = document.getElementById('refreshBtn');
    const pickerText = document.getElementById('pickerBtnText');
    btn.classList.add('spinning');
    pickerText.textContent = 'Loading matches…';

    try {
      const res = await fetch('/.netlify/functions/matches');
      const data = await res.json();
      if (data.error) throw new Error(data.error);
      matches = data.matches || [];
      buildMatchDropdown();
      pickerText.textContent = selectedMatch ? selectedMatch.title : 'Select a match…';
      document.getElementById('matchCount').textContent = `${matches.length} matches`;
    } catch (e) {
      pickerText.textContent = 'Failed to load — click to retry';
      setStatus(e.message, true);
    } finally {
      btn.classList.remove('spinning');
    }
  }

  // ── Load the hardcoded match, skipping the matches-list fetch but still using streams.js ──
  async function loadHardcodedStream() {
    // Pull the slug out of the full match URL, e.g. 'spain-vs-austria-2503636'
    const slug = HARDCODED_MATCH_URL.split('/watch/kobra/')[1]?.replace(/\/$/, '');
    if (!slug) {
      setStatus('Could not parse slug from HARDCODED_MATCH_URL', true);
      return;
    }

    document.getElementById('pickerBtnText').textContent = 'Loading…';
    document.getElementById('matchTitle').textContent = 'Loading…';
    setStatus('Fetching streams…');

    try {
      const res = await fetch(`/.netlify/functions/streams?slug=${encodeURIComponent(slug)}`);
      const data = await res.json();
      if (data.error) throw new Error(data.error);
      if (!data.streams || !data.streams.length) throw new Error('No streams found');

      const title = data.title || slug;
      document.getElementById('pickerBtnText').textContent = title;
      document.getElementById('matchTitle').textContent = title;

      streams = data.streams;
      currentIdx = 0;
      buildStreamDropdown();
      document.getElementById('streamRow').classList.add('visible');
      switchStream(0, false);
      setStatus(`${streams.length} streams available`);
    } catch (e) {
      setStatus(e.message, true);
      const stageEmptyText = document.getElementById('stageEmptyText');
      if (stageEmptyText) stageEmptyText.textContent = 'Loading failed';
    }
  }

  // ── Build match dropdown ──
  function buildMatchDropdown() {
    const dd = document.getElementById('matchDropdown');
    const header = dd.querySelector('.match-dropdown-header');
    dd.innerHTML = '';
    dd.appendChild(header);

    if (!matches.length) {
      const empty = document.createElement('div');
      empty.className = 'match-empty';
      empty.textContent = 'No matches found';
      dd.appendChild(empty);
      return;
    }

    // Group: live first, then by category
    const live = matches.filter(m => m.live);
    const upcoming = matches.filter(m => !m.live);

    if (live.length) {
      const lbl = document.createElement('div');
      lbl.className = 'match-group-label';
      lbl.textContent = `🔴 Live (${live.length})`;
      dd.appendChild(lbl);
      live.forEach(m => dd.appendChild(makeMatchItem(m)));
    }

    if (upcoming.length) {
      const lbl = document.createElement('div');
      lbl.className = 'match-group-label';
      lbl.textContent = `Upcoming (${upcoming.length})`;
      dd.appendChild(lbl);
      upcoming.forEach(m => dd.appendChild(makeMatchItem(m)));
    }
  }

  function makeMatchItem(m) {
    const item = document.createElement('div');
    item.className = 'match-item' + (selectedMatch && selectedMatch.slug === m.slug ? ' active' : '');
    item.innerHTML = `
      ${m.live ? '<span class="match-live-dot"></span>' : ''}
      <span class="match-item-title">${m.title}</span>
      <span class="match-cat-badge">${m.category}</span>
      <span class="match-sources">${m.sources} src</span>
    `;
    item.onclick = () => selectMatch(m);
    return item;
  }

  // ── Select a match ──
  async function selectMatch(m) {
    selectedMatch = m;
    closeMatchDropdown();
    document.getElementById('pickerBtnText').textContent = m.title;
    document.getElementById('matchTitle').textContent = m.title;
    setStatus('Fetching streams…');
    cancelAutoSwitch();

    try {
      const res = await fetch(`/.netlify/functions/streams?slug=${encodeURIComponent(m.slug)}`);
      const data = await res.json();
      if (data.error) throw new Error(data.error);
      if (!data.streams || !data.streams.length) throw new Error('No streams found');

      streams = data.streams;
      currentIdx = 0;
      buildStreamDropdown();
      document.getElementById('streamRow').classList.add('visible');
      switchStream(0, false);
      setStatus(`${streams.length} streams available`);
    } catch (e) {
      setStatus(e.message, true);
      const stageEmptyText = document.getElementById('stageEmptyText');
      if (stageEmptyText) stageEmptyText.textContent = 'Loading failed';
    }
  }

  // ── Match dropdown toggle ──
  function toggleMatchDropdown() {
    const dd = document.getElementById('matchDropdown');
    const btn = document.getElementById('pickerBtn');
    const open = dd.classList.toggle('open');
    btn.classList.toggle('open', open);
  }

  function closeMatchDropdown() {
    document.getElementById('matchDropdown').classList.remove('open');
    document.getElementById('pickerBtn').classList.remove('open');
  }

  // ── Stream dropdown ──
  function buildStreamDropdown() {
    const dd = document.getElementById('streamDropdown');
    const header = dd.querySelector('.dropdown-header');
    dd.innerHTML = '';
    dd.appendChild(header);

    streams.forEach((s, i) => {
      const item = document.createElement('div');
      item.className = 'dropdown-item' + (i === currentIdx ? ' active' : '');
      item.innerHTML = `<span class="stream-num">${String(i+1).padStart(2,'0')}</span>${s.label}`;
      item.onclick = () => { closeStreamDropdown(); currentIdx = i; switchStream(i, true); };
      dd.appendChild(item);
    });
  }

  function updateStreamActive() {
    document.querySelectorAll('.dropdown-item').forEach((el, i) => {
      el.classList.toggle('active', i === currentIdx);
    });
  }

  function toggleStreamDropdown() {
    const dd = document.getElementById('streamDropdown');
    const btn = document.getElementById('dotsBtn');
    const open = dd.classList.toggle('open');
    btn.classList.toggle('open', open);
  }

  function closeStreamDropdown() {
    document.getElementById('streamDropdown').classList.remove('open');
    document.getElementById('dotsBtn').classList.remove('open');
  }

  // ── Stream switching ──
  function switchStream(idx, manual) {
    cancelAutoSwitch();
    currentIdx = idx;
    const src = streams[idx].src;
    const player = document.getElementById('streamPlayer');
    const empty  = document.getElementById('stageEmpty');

    player.src = '';
    player.onerror = () => {
      if (currentIdx < streams.length - 1) startAutoSwitch();
      else setStatus('All streams failed', true);
    };
    player.onload = () => {
      document.getElementById('switchOverlay').classList.remove('visible');
    };

    player.src = src;
    player.style.display = 'block';
    empty.style.display = 'none';
    updateStreamActive();
    if (manual) setStatus(`Stream ${currentIdx + 1} of ${streams.length}`);
  }

  function nextStream() {
    cancelAutoSwitch();
    if (!streams.length) return;
    const next = (currentIdx + 1) % streams.length;
    switchStream(next, true);
  }

  function startAutoSwitch() {
    if (currentIdx >= streams.length - 1) { setStatus('All streams failed', true); return; }
    const overlay = document.getElementById('switchOverlay');
    const countdownEl = document.getElementById('countdown');
    overlay.classList.add('visible');
    let count = 3;
    countdownEl.textContent = count;
    setStatus('Stream failed — auto-switching…', true);
    countdownInterval = setInterval(() => {
      count--;
      countdownEl.textContent = count;
      if (count <= 0) {
        clearInterval(countdownInterval);
        overlay.classList.remove('visible');
        nextStream();
      }
    }, 1000);
  }

  function cancelAutoSwitch() {
    clearInterval(countdownInterval);
    document.getElementById('switchOverlay')?.classList.remove('visible');
  }

  // ── Fullscreen ──
  function toggleFullscreen() {
    const stage = document.getElementById('stage');
    if (!document.fullscreenElement) stage.requestFullscreen().catch(() => {});
    else document.exitFullscreen();
  }

  // ── Close dropdowns on outside click ──
  document.addEventListener('click', e => {
    if (!document.getElementById('pickerWrap').contains(e.target)) closeMatchDropdown();
    const dotsWrap = document.querySelector('.dots-wrap');
    if (dotsWrap && !dotsWrap.contains(e.target)) closeStreamDropdown();
  });

  // ── Init ──
  fetchMatches();
</script>

</body>
</html>
