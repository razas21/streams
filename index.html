<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FIFA World Cup 2026</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;600&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #08090c;
    color: #e2e8f0;
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 2rem 1rem;
    gap: 0;
  }

  .live {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    font-size: 0.65rem;
    font-weight: 600;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: #94a3b8;
    margin-bottom: 1.5rem;
  }

  .live-dot {
    width: 6px; height: 6px;
    background: #e63946;
    border-radius: 50%;
    animation: blink 1.4s ease-in-out infinite;
  }

  @keyframes blink {
    0%, 100% { opacity: 1; }
    50%       { opacity: 0.2; }
  }

  #matchTitle {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.6rem;
    letter-spacing: 0.12em;
    color: #cbd5e1;
    margin-bottom: 1.25rem;
    text-align: center;
    min-height: 2rem;
  }

  .controls {
    width: min(920px, 100%);
    display: flex;
    gap: 0.5rem;
    margin-bottom: 0.75rem;
    flex-wrap: wrap;
  }

  .url-input {
    flex: 1;
    min-width: 0;
    background: #0f1217;
    border: 1px solid #1e2330;
    border-radius: 6px;
    color: #e2e8f0;
    font-family: 'Inter', sans-serif;
    font-size: 0.78rem;
    padding: 0 0.85rem;
    height: 38px;
    outline: none;
    transition: border-color 0.15s;
  }

  .url-input::placeholder { color: #334155; }
  .url-input:focus { border-color: #3b4a63; }

  .load-btn {
    background: #1e2d45;
    border: 1px solid #2d4a6b;
    border-radius: 6px;
    color: #7eb8f7;
    font-family: 'Inter', sans-serif;
    font-size: 0.75rem;
    font-weight: 600;
    padding: 0 1.1rem;
    height: 38px;
    cursor: pointer;
    white-space: nowrap;
    transition: background 0.15s;
    letter-spacing: 0.04em;
  }

  .load-btn:hover { background: #243552; }
  .load-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  /* Stream controls row */
  .stream-row {
    width: min(920px, 100%);
    display: none;
    gap: 0.5rem;
    margin-bottom: 0.75rem;
    align-items: center;
    justify-content: flex-end;
  }

  .stream-row.visible { display: flex; }

  /* Not working button */
  .next-btn {
    background: transparent;
    border: 1px solid #1e2330;
    border-radius: 6px;
    color: #475569;
    font-family: 'Inter', sans-serif;
    font-size: 0.72rem;
    font-weight: 500;
    padding: 0 0.9rem;
    height: 34px;
    cursor: pointer;
    white-space: nowrap;
    transition: border-color 0.15s, color 0.15s;
    display: flex;
    align-items: center;
    gap: 0.4rem;
    flex-shrink: 0;
  }

  .next-btn:hover { border-color: #e63946; color: #e63946; }
  .next-btn svg { width: 12px; height: 12px; }

  /* Three-dot button + dropdown wrapper */
  .dots-wrap {
    position: relative;
  }

  .dots-btn {
    background: transparent;
    border: 1px solid #1e2330;
    border-radius: 6px;
    color: #475569;
    width: 34px;
    height: 34px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: border-color 0.15s, color 0.15s;
    letter-spacing: 0.05em;
    font-size: 0.9rem;
    line-height: 1;
  }

  .dots-btn:hover,
  .dots-btn.open { border-color: #3b4a63; color: #94a3b8; }

  /* Dropdown */
  .stream-dropdown {
    position: absolute;
    bottom: calc(100% + 6px);
    right: 0;
    background: #0f1217;
    border: 1px solid #1e2330;
    border-radius: 8px;
    min-width: 280px;
    max-height: 260px;
    overflow-y: auto;
    z-index: 100;
    display: none;
    box-shadow: 0 8px 32px rgba(0,0,0,0.7);
    scrollbar-width: thin;
    scrollbar-color: #1e2330 transparent;
  }

  .stream-dropdown.open { display: block; }

  .dropdown-header {
    padding: 0.5rem 0.85rem;
    font-size: 0.6rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: #334155;
    border-bottom: 1px solid #0d1015;
  }

  .dropdown-item {
    display: flex;
    align-items: center;
    gap: 0.6rem;
    padding: 0.55rem 0.85rem;
    font-size: 0.72rem;
    color: #64748b;
    cursor: pointer;
    transition: background 0.1s, color 0.1s;
    border-bottom: 1px solid #0d1015;
    font-family: 'Inter', sans-serif;
  }

  .dropdown-item:last-child { border-bottom: none; }
  .dropdown-item:hover { background: #131820; color: #94a3b8; }
  .dropdown-item.active { color: #e2e8f0; background: #131820; }

  .stream-num {
    font-size: 0.6rem;
    color: #334155;
    min-width: 1.4rem;
    font-variant-numeric: tabular-nums;
  }

  .dropdown-item.active .stream-num { color: #e63946; }

  /* Player */
  .stage {
    width: min(920px, 100vw);
    aspect-ratio: 16 / 9;
    border-radius: 8px;
    overflow: hidden;
    border: 1px solid #141820;
    box-shadow: 0 32px 80px rgba(0,0,0,0.8);
    position: relative;
    background: #0a0b0e;
  }

  .stage iframe {
    width: 100%; height: 100%;
    border: none; display: block;
  }

  .stage-empty {
    position: absolute; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 0.75rem;
  }

  .stage-empty p {
    font-size: 0.72rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: #1e2535;
  }

  /* Auto-switch overlay */
  .switch-overlay {
    position: absolute; inset: 0;
    background: rgba(8,9,12,0.85);
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 0.75rem;
    z-index: 10;
  }

  .switch-overlay.visible { display: flex; }

  .switch-overlay p {
    font-size: 0.78rem;
    color: #94a3b8;
    letter-spacing: 0.06em;
  }

  .switch-overlay .countdown {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 2.5rem;
    color: #e63946;
    line-height: 1;
  }

  .switch-overlay .cancel-btn {
    background: transparent;
    border: 1px solid #1e2330;
    border-radius: 5px;
    color: #475569;
    font-family: 'Inter', sans-serif;
    font-size: 0.7rem;
    padding: 0.35rem 0.85rem;
    cursor: pointer;
    transition: color 0.15s, border-color 0.15s;
    margin-top: 0.25rem;
  }

  .switch-overlay .cancel-btn:hover { color: #e2e8f0; border-color: #475569; }

  .status {
    font-size: 0.68rem;
    color: #475569;
    letter-spacing: 0.06em;
    margin-top: 0.75rem;
    min-height: 1rem;
    text-align: center;
  }

  .status.error { color: #e63946; }

  @media (max-width: 500px) {
    .controls { flex-direction: column; }
    .load-btn { height: 38px; width: 100%; }
    .next-btn span { display: none; }
  }
</style>
</head>
<body>

  <div class="live">
    <span class="live-dot"></span>
    Live · FIFA World Cup 2026
  </div>

  <div id="matchTitle"></div>

  <div class="controls">
    <input class="url-input" id="urlInput" type="text"
      placeholder="Paste ntvs.cx match URL — e.g. https://ntvs.cx/watch/kobra/spain-vs-uruguay-2502846"
      autocomplete="off" spellcheck="false" />
    <button class="load-btn" id="loadBtn" onclick="loadMatch()">Load</button>
  </div>

  <div class="stream-row" id="streamRow">
    <button class="next-btn" onclick="nextStream()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M5 12h14M13 6l6 6-6 6"/>
      </svg>
      <span>Not working?</span>
    </button>
    <div class="dots-wrap">
      <button class="dots-btn" id="dotsBtn" onclick="toggleDropdown()" title="Select stream">···</button>
      <div class="stream-dropdown" id="streamDropdown">
        <div class="dropdown-header">Select stream</div>
      </div>
    </div>
  </div>

  <div class="stage" id="stage">
    <div class="stage-empty" id="stageEmpty">
      <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#1e2535" stroke-width="1">
        <rect x="2" y="3" width="20" height="14" rx="2"/>
        <path d="M8 21h8M12 17v4"/>
      </svg>
      <p>paste a match url above</p>
    </div>
    <iframe id="streamPlayer" style="display:none" allowfullscreen
      allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; fullscreen">
    </iframe>
    <div class="switch-overlay" id="switchOverlay">
      <p>Stream failed — switching in</p>
      <div class="countdown" id="countdown">3</div>
      <button class="cancel-btn" onclick="cancelAutoSwitch()">Cancel</button>
    </div>
  </div>

  <div class="status" id="status"></div>

<script>
  let streams = [];
  let currentIdx = 0;
  let countdownInterval = null;

  function slugFromUrl(raw) {
    raw = raw.trim();
    const m = raw.match(/\/watch\/[^/]+\/([^/?#]+)/);
    return m ? m[1] : raw;
  }

  function setStatus(msg, isError) {
    const el = document.getElementById('status');
    el.textContent = msg;
    el.className = 'status' + (isError ? ' error' : '');
  }

  async function loadMatch() {
    const raw = document.getElementById('urlInput').value;
    if (!raw.trim()) return;

    const slug = slugFromUrl(raw);
    if (!slug) { setStatus('Could not parse URL', true); return; }

    const btn = document.getElementById('loadBtn');
    btn.disabled = true;
    btn.textContent = 'Loading…';
    setStatus('Fetching streams…');
    cancelAutoSwitch();

    try {
      const res = await fetch(`/.netlify/functions/streams?slug=${encodeURIComponent(slug)}`);
      const data = await res.json();

      if (!res.ok || data.error) throw new Error(data.error || 'Failed to load streams');
      if (!data.streams || data.streams.length === 0) throw new Error('No streams found for this match');

      streams = data.streams;
      currentIdx = 0;

      document.getElementById('matchTitle').textContent = data.title || slug;
      buildDropdown();
      document.getElementById('streamRow').classList.add('visible');
      switchStream(0, false);
      setStatus(`${streams.length} streams available`);

    } catch (e) {
      setStatus(e.message, true);
    } finally {
      btn.disabled = false;
      btn.textContent = 'Load';
    }
  }

  function buildDropdown() {
    const dropdown = document.getElementById('streamDropdown');
    // Remove old items (keep header)
    const header = dropdown.querySelector('.dropdown-header');
    dropdown.innerHTML = '';
    dropdown.appendChild(header);

    streams.forEach((s, i) => {
      const item = document.createElement('div');
      item.className = 'dropdown-item' + (i === currentIdx ? ' active' : '');
      item.innerHTML = `<span class="stream-num">${String(i + 1).padStart(2, '0')}</span>${s.label}`;
      item.onclick = () => {
        closeDropdown();
        currentIdx = i;
        switchStream(i, true);
      };
      dropdown.appendChild(item);
    });
  }

  function updateDropdownActive() {
    document.querySelectorAll('.dropdown-item').forEach((el, i) => {
      el.classList.toggle('active', i === currentIdx);
    });
  }

  function switchStream(idx, manual) {
    cancelAutoSwitch();
    currentIdx = idx;
    const src = streams[idx].src;

    const player = document.getElementById('streamPlayer');
    const empty  = document.getElementById('stageEmpty');

    player.src = '';

    player.onerror = () => {
      if (currentIdx < streams.length - 1) {
        startAutoSwitch();
      } else {
        setStatus('All streams failed — try a different match URL', true);
      }
    };

    player.onload = () => {
      document.getElementById('switchOverlay').classList.remove('visible');
    };

    player.src = src;
    player.style.display = 'block';
    empty.style.display = 'none';
    updateDropdownActive();

    if (manual) setStatus(`Stream ${currentIdx + 1} of ${streams.length}`);
  }

  function nextStream() {
    cancelAutoSwitch();
    if (!streams.length) return;
    const next = (currentIdx + 1) % streams.length;
    switchStream(next, true);
  }

  function startAutoSwitch() {
    if (currentIdx >= streams.length - 1) {
      setStatus('All streams failed', true);
      return;
    }
    const overlay = document.getElementById('switchOverlay');
    const countdownEl = document.getElementById('countdown');
    overlay.classList.add('visible');
    let count = 3;
    countdownEl.textContent = count;
    setStatus('Stream failed — auto-switching…', true);
    countdownInterval = setInterval(() => {
      count--;
      countdownEl.textContent = count;
      if (count <= 0) {
        clearInterval(countdownInterval);
        overlay.classList.remove('visible');
        nextStream();
      }
    }, 1000);
  }

  function cancelAutoSwitch() {
    clearInterval(countdownInterval);
    document.getElementById('switchOverlay')?.classList.remove('visible');
  }

  function toggleDropdown() {
    const dd = document.getElementById('streamDropdown');
    const btn = document.getElementById('dotsBtn');
    const isOpen = dd.classList.contains('open');
    dd.classList.toggle('open', !isOpen);
    btn.classList.toggle('open', !isOpen);
  }

  function closeDropdown() {
    document.getElementById('streamDropdown').classList.remove('open');
    document.getElementById('dotsBtn').classList.remove('open');
  }

  // Close dropdown on outside click
  document.addEventListener('click', e => {
    const wrap = document.querySelector('.dots-wrap');
    if (wrap && !wrap.contains(e.target)) closeDropdown();
  });

  document.getElementById('urlInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') loadMatch();
  });
</script>

</body>
</html>
